指定之初節為風關在寅位二節為氣關在卯位三節為命關在辰位凡病紋在初關易治過中關難治直透三關者不治色紅者風熱輕赤者風熱盛紫者驚青者驚積青赤相半驚風食積俱有青而紫主急驚風青而淡紫伸縮來去主慢驚風紫絲青絲或黑絲隱隱相雜似出不出主慢脾風若兩指三關青是水驚三關黑必人驚三關赤必雷驚色黃或青或紅有紋如線一直者是乳食傷脾及發熱驚也左右一樣者是驚風積發有三又或散是肺生風痰或似齁䶎聲有青者是傷寒及咳有紅黑相兼主痢紅多白痢黑多赤痢虎口脈紋亂乃氣不和蓋脈紋見有五色黃紅紫青黑色常黃紅有色無形者安寧也一見形即是病由其病甚色能變黃黃盛則紅紅盛則紫紫盛則青青盛則黑至於純黑則難治也又當辨其形有如流珠者主膈熱三焦不和飲食欲吐泄瀉腸鳴煩躁啼哭如流珠差大名曰環珠者主脾虛停食胸腹膨脹煩渴發熱也有如長珠一頭大一頭尖者主腹傷飲食積滯腹痛寒熱不食有如了來者下頭粗大者主脾胃濕熱中脘不利乾嘔不食有如如去蛇上頭粗大者主脾虛冷積吐瀉煩渴氣短神困多睡不食有如弓彎弓反相中主者主寒熱邪氣頭目昏重心神驚怖倦怠四肢冷積小便赤色咳嗽吐涎有如弓彎弓反向大指者主痰熱心神恍惚作熱來驚夾風夾食向內者吉向外者凶有如弓槍形者主風熱發痰疾作有如帶魚骨形者主驚風痰熱少食發熱痰盛發搐乃肝木克脾土也有如川水字形者主驚悸食積煩躁痞悶少食夜啼痰盛口噤搐搦此脾虛積滯木剋土也或曰水字是肺病也謂驚風入肺有如丨針形者乃心熱極生風驚悸煩悶困倦不食痰盛發搐有透關射指者透關向里為射指主驚風痰熱聚於胸膈乃脾肺損傷痰邪乘聚有透關射甲者透關向外為射甲主驚風惡症十死一生了魚刺者風關青色主驚氣關主肝命關主脾虛難治有如乁乙字者在初關主肝驚二關急驚三關慢驚脾風有如弓曲蟲者肺病甚也有如字虯紋者心蟲動也有如乙者腎有蟲也如乁向右主風寒如丿向左主傷風如丶乙者傷寒者傷冷青白紫筋上無名指三關難治上中指三關易治也手訣其手法不一有於三關作法者凡作法先掐心經點勞宮男推上三關退寒加暖屬熱女反此推於六作法者凡作法先掐心經點勞宮男推熱加涼女反此推上為涼也有名黃蜂出洞者凡熱作此法先掐心經次掐勞宮先開三關後以左右二大指從陰陽處起一撮一上至關中離坎上掐穴發用之有名水裡撈月凡大寒作此法先清天河水後五指皆跪中指向前四指隨後右運勞宮以涼吹之退熱可用若先取天河水至勞左運呵暖氣發汗有名鳳凰單展翹凡濕熱作此法用右手大指掐總筋四指翻大指下大指又起又翻如此至關中五指取六掐之有名打馬過河凡濕寒作此法右運勞宮畢曲指向上彈內關陽池間使天邊生涼退熱用之有名飛經走氣凡氣滯作此法是運五經後五指門張一讓作關中用手打拍乃氣行也又法以一手推心經至橫紋住以一手揉氣關竅通也有名按弦擦磨者凡化痰作此法先運八卦後開指擦病人手關上一擦關中一擦關下一擦拿病人手輕輕慢慢而搖有名天門入虎口凡清脾作此法用右手大指掐兒虎口中指掐位天門食指掐住總會以左五指聚住揉鬥肘輕輕慢慢搖生氣順氣也又法自乾宮經坎艮入虎口按之有名猿猴摘果凡消食作此法以兩手攝兒螺螄上皮摘之有名赤鳳搖頭凡治驚作此法以兩手捉兒頭搖之其處在耳前少上有名二龍戲珠凡驚吊眼作此法以兩手攝兒兩耳輪戲之如初受驚眼不弔兩邊輕重如一如眼上則下重下則上重有名丹鳳搖頭凡治作此法以一手掐勞宮一手掐心經搖之有名黃蜂入洞凡去風寒作此法曲小兒小指揉小兒勞宮有名鳳凰鼓翹凡黃腫掐精靈二穴前後搖之有名燕遊飛凡黃腫作此法以大指自脾土外邊推去經三關六府天門勞宮邊還上脾土有名運水入土凡脾土虛弱作此法以一手從腎經推去經兌乾坎艮至脾土按之脾胃火旺水火不能兼濟用此法有名運土入水凡腎水頻數照前法反回是也亦可治小便赤澀名老漢扳繒凡痞塊無論新久大小以一手托兒𦙒肘運轉男左轉女右轉再以一手捉手搖動有名運勞宮是也乃曲中指運兒勞宮也右運涼左運肝有名運八卦以大指運之男左女右開胸化痰有名運五經又以大指往來擦五經紋能動五臟六腑之氣有名推四橫紋以大指往來推四橫紋能治上下氣氣喘腹痛可用名分陰陽曲兒拳於手背上四指節從中往兩下分之分利氣血有名和陰陽從兩合之理氣血用有名天河水推之自上而下也輕按住間使退天河水也有掐手面者一掐心經二掐勞宮推上為熱諸臟有疾引孔間竅又一掐肺經二掐離宮離上缺乾上正中間輕兩起上處重治肺家嗽又一掐大腸側推到虎口推上為補小兒泄瀉退下主泄瀉也又一掐腎經二掐小橫紋退六府治小兒便赤澀滯又一掐脾土曲肘左轉為補直指推之為瀉治兒虛弱之症乳食少進又一掐腎水下節二掐腎水大橫紋退六府為涼退潮又一掐總筋清天河水退熱又一掐小天心治天吊驚風又能生腎水又一推𦙀門治小兒氣促氣攻此掐手面九法也有掐手背者一掐威靈穴專治急驚風又一掐扇門兒已死掐此穴如有聲尚可治無聲難治又一掐兩扇門治小兒急驚口眼歪斜左向右重右向左輕又治熱不退汗不來又一掐精靈穴治痰湧氣促氣急不退又一掐二人上馬穴治小兒便赤澀清熱補腎水又一掐後溪穴推上為清推下為補小便赤能清腎精虧能補又一掐外勞宮治糞白不變五穀不消肚疼泄瀉內外齊掐止瘧疾又一掐陽池穴治風痰之症又一掐一窩風治小兒久病腹痛或慢驚又一掐五指節治小兒被嚇掐之可蘇人事不省又一掐龜尾穴並揉臍治小兒水瀉痢疾又治烏沙脹臍風盤腸急慢等驚之症揉臍法以左手大指按小兒臍下丹田以右手大指周回擦摩之又一掐𦙒肘下曲筋池上總筋治急驚風此掐手背十二穴也又有止小兒吐瀉者又於橫門刮至中指尖掐之治吐瀉主一節處掐又法在於𦙀門推上橫紋橫紋推至中指尖止掐又中指一節上推至橫紋橫紋推至𦙀門掐止吐又法提手背四指內頂橫紋還上掐止吐又手背刮至中指一節處掐主瀉中指尖第一外節掐止瀉橫紋推向𦙀門主止瀉𦙀門推向橫紋主止瀉退外脾瀉法推外脾補虛止瀉如被水驚𦙀門大冷如被風驚𦙀門大熱如被驚嚇又熱又跳先探五指要辨冷熱如瀉黃尿熱如瀉青尿冷此行吐瀉止吐瀉諸法也又有掐手六經者皆從大指邊向里數也第一赤筋乃浮陽屬火以應心與腸主霍亂外通舌反則燥熱卻向乾位掐之則陽自然散也又於橫門下本筋掐之下五筋仿此第二青筋乃陽屬木以應肝膽主濕和外通兩目反則赤澀多汗卻向坎掐之兩目則自然明也第三總筋居中屬土總五行以應脾胃主溫暖外通四大𦙀門反則主腸鳴霍亂吐瀉痢症卻向中界掐之則四肢舒暢也第四筋赤淡黃筋居中分界火土兼修以應三焦主半寒半熱外通四大𦙀門周流一身反則主壅塞之症卻向中宮掐之則元氣周流通壅塞之患也第五白筋乃濁陰屬金以應肺與大腸主微涼外通兩鼻孔反則膈胃脹滿腦昏生痰卻在界後掐之第六黑筋乃重濁純陰以左腎與膀胱經主冷氣外通兩耳反則尫羸昏沉卻於坎位掐之此六筋掐法也內熱外寒掐浮筋作痛掐陽筋即出汗諸驚風掐總筋作寒掐心經筋即轉寒作熱掐陰筋轉內熱外寒掐腎經即止此六筋掐法修之於斯也又有掐足法凡男左手右足女右手左足掐大敦穴治小兒厲爪驚本穴掐之就揉解溪穴治小兒內吊驚往後仰本穴掐之就揉中臁穴治小兒驚來掐之就揉湧泉穴以治小兒吐瀉本穴掐左轉揉吐即止右轉揉瀉即止左轉不揉瀉右轉不揉吐男依此女反此僕參穴治小兒腳掣跳口咬本穴就揉左轉治吐右轉治瀉又驚又吐又瀉掐此穴及足中指有效豕山穴治小兒氣吼本穴掐就揉委中穴兒望撲掐此小兒諸驚推揉法應病諸法作用以成一手法如因酒食無度勞郁傷神以至四肢作冷口含母乳一噴一吐肚上青筋氣急此係心經有熱推三關五十推天河水二百退六腑一百運八卦一百運五經水裡撈月五十用火胸前六醮小便頭上掐一爪用蛇脫回足纏之即好如因暈腥熱炙脾胃頭亂舞因風受熱推三關一百推肺經一百運八卦五十推脾土一百運五經七十推天河水二百水底撈月飛經走氣二十天心穴掐之二筋一掐即用燈火手足肩膊上一醮喉上一醮喉下三醮臍下一醮如因生冷過度乳食所傷於五臟六腑大寒吐嘔身軟唇白即是六腑寒乳食傷食三關三百分陰陽二百推脾土一百推四大二百黃蜂五十撈月十六二扇門將手心揉臍及龜尾五十男左女右將燈火炙之夾車一醮更推背心如因失飢傷飽飲食不納脾胃虛弱遍身熱氣吼口渴手足常掣眼紅推三關一十推肺經二百推脾土一百運八卦分陰陽一百二扇門二十若出汗後再如退六府二十水底撈月二十如因生冷太過或迎風食血經變或痧行遍身四肢黑青筋過臉肚腹膨脹唇黑五臟有寒皆因好食涼物推上三關二百推脾土百二扇三十運八卦一百四橫紋五十黃蜂二十分陰陽三十將手心擦臍五十用燈火青筋縫上七醮背亦斷青紋更妙又將黃土一塊碗研為末七醋一盅鍋內炒過將手袱包在頭上過下推入腳用針刺破再用燈心火手腳四心斷之如因吃食時受嚇或吃冷物以傷榮衛大叫一口一死眼閉一掣一跳開口即是被嚇心經有熱推三關三十清天河水一百補脾土一百清腎水五十運八卦一百天門入虎口操𦙒肘用大顛門口角上下肩膊掌心腳跟眉心心窩鼻各一燋或用老鴉蒜曬乾燒為末在心窩揉之如因寒受驚風痰結湧乳氣不絶口吐白沫四肢擺眼翻即是因寒受嚇肺經有病推三關一百推肺經一百推天河五十按弦擦摩運五經三十掐五指節三十囟心上用燈灸四燋口角上下各一燋心演臍下各一燋如因傷食於脾土夜間飲食大過胃中不能克化氣吼肚膨青筋眼喎一百運八卦五十分陰陽五十將手操臍五十按弦法擦摩精靈穴一百青筋經上用燈四燋如瀉豬尾骨上一燋若吐心窩上下四燋腳軟鬼眼一燋手軟曲池一燋側拐又一燋頭軟天心一燋臍上下各一燋若不開口心窩一燋如因食甜辣之物耗散榮衛臨睡啼哭心腋掣跳哭不出即是被嚇心經有熱一推三關一十清天河二百退六府一百分陰陽五十清腎水五十水裡撈月五十如到晚昏沉不知人事口眼歪斜手足掣跳寒熱不均推三關五十退六府五十補脾土五十掐手指五十分陰陽十按弦法擦摩十如因食生冷積毒以致傷胸肺中有風痰裹心經心絡之間手掐拳四肢掣跳口眼歪斜是也受嚇感風推三關二十推脾土二十推肺經五十運八卦推四橫紋五十運五經二十猿猴摘果二十掐節三次後用燈心斷鼻梁眉心心演總筋足鞋帶以生薑如因之間受其驚搐脾經有痰咬牙嘴歪眼斜四肢掣跳喎間迷悶即是脾腎虧敗久瘧被嚇非一日之疾推三關一百補脾土二百推肺經二百運八卦五十掐五指節一十天門入虎口揉鬥肘一十赤鳳搖頭二十運五經三十此驚難救掐住眉心良久便好兩太陽心窩用潮油推之用火上下手足各四燋如因臨産下風入臍中口吐白沫四肢掣動掐拳偏眼是也推三關一十推肺經一十將燈火臍上七燋大指節各四燋囟門四燋喉下心間各一燋如因飲食或冷或熱傷於脾胃失於調理冷痰湧於肺經四肢後仰哭不出聲痰向後伸是也推三關一百赤鳳二十推四橫紋三十推脾土二百補腎一百運八卦一百分陰陽二十腳膝上四燋青筋縫上七燋喉下三燋將內關掐之如因父母同處與之處乳食所傷風痰經於胃口手足向後即是肺經推三關五十推肺經一百推脾土一百補腎水五十分陰陽一百飛經走氣十囟門用燈火四燋
