body:
  text: 癱瘓諸穴道設有中風不省人事者於患人印堂穴並人中穴用指先掐人中穴五七十度方用兩掌擦極熱摩印堂穴五七十度按摩畢方令患人如前行靜功調攝人中乃任脈之總脈也其穴在鼻柱之下三分用水含口內微凸上是人中穴印堂在眉心正中二穴兼掐治小兒驚風設有中風口眼斜者可於承漿穴掐五七十度及摩五七十度兼用靜功承漿穴乃任脈之在口唇下五分正中間是也設中風口歪者亦可於地倉穴掐五七十度搓五七十度兼行靜功地倉穴乃足陽明胃經之穴在口角尖去五分是也設有癲癇怔忡心性癡呆及痰迷心竅可於神門穴掐五七十度搓五七十度兼行靜功調攝神門穴乃手少陰心經其穴在手掌腕後高骨間轉手骨開縫中是穴也或有中風不省於頰車穴合谷穴或有半身不遂於肩髃曲池環跳風市居窖丘墟八穴皆照前治之諸穴後此不細載按摩勞傷諸穴勞傷骨蒸者可於膏肓穴掐五七十度搓五七十度兼靜功膏肓穴乃足太陽膀胱經在背四椎骨下五椎骨上兩旁各開三寸去飯匙骨可容側指平身坐手按兩膝頭開肩骨陷穴自見也此穴亦能治虛汗及吐血諸症設有虛熱盜汗衄血五勞七傷等症可於百帶穴掐五七十度搓五七十度兼行靜功百帶穴乃腎經脈在背大椎骨上平肩取之穴自見也設有吐紅痰症可於俞府穴掐五七十度搓五七十度兼行靜功俞府穴乃足少陰腎經穴也在旋璣兩旁各開一寸半仰頭取之旋璣在天突下一寸陷中仰視得之天突在結喉下二寸宛宛中兩筋間是穴也設俞府穴兼可治哮吼痰症設有下元虛者可於氣海穴掐五七十度擦五七十度兼行靜功氣海穴乃任脈經從臍中量下一寸半是穴也此穴兼治諸氣及小腸氣諸疝氣並婦人帶下等證設有遺精疾症可於關元穴掐五七十度擦五七十度兼行靜功關元穴乃任脈經在臍下三寸是穴也按遺精白濁或亦治命門白環腎俞查穴參治之設有心虛膽怯及遺精盜汗者可於心俞穴掐五七十度擦五七十度兼行靜功心俞穴乃足太陽膀胱經穴在背五椎骨下兩旁各開一半寸是也兼治癲癇之疾設有虛火旺者於三里穴掐五七十度擦五七十度兼行靜功三里穴乃足陽明經胃之脈在膝蓋下三寸外臁大筋內間舉大足指牽上肉動處是也設有童勞於長強穴掐五七十度擦五七十度兼行靜功長強穴乃腎脈藏在尾骶骨尖上陷中是穴伏地取之此穴兼治痔漏痔瘡腸風下血膨脹症設有膨脹氣喘腹痛者可於建里穴掐五七十度擦五七十度兼行靜功建里穴乃任脈徑在中脘下一寸臍上三寸是也設有水腫諸痰可於水分穴掐五七十度擦五七十度兼靜功水分穴乃任脈經在下脘下一寸臍上一寸是穴也小腹脹滿者可於水分水道中脘氣海等穴掐五七十度擦五七十度兼行靜功設有遍身腫脹可於水分三里氣海諸穴掐五七十度擦五七十度兼行靜功膈噎症設有翻胃吐食等證可於脾俞穴掐五七十度擦五七十度兼行靜功脾俞穴在足太陽膀胱經在背第十一椎骨下脊中兩旁各開一寸半是也此穴兼治黃疸症如前擦掐行靜功眼目症設有眼目昏赤可於攢竹穴掐五七十度兼行清靜功夫攢竹穴乃足太陽膀胱經在眉內尖角陷中是穴也設有眼昏可於睛明穴用大指第一節於掌心內擦熱尉之兼靜功睛明穴乃足太陽膀胱經在目眥內孔中是也設有血虛兩目昏花者可於肝俞穴掐五七十度擦五七十度兼清靜功夫調攝肝俞穴乃足太陽膀胱經在脊第九椎骨下兩旁邊各開一寸是穴也設有眼痛目昏者可於青靈穴掐五七十度擦五七十度兼靜功青靈穴在手少陰心經在肘上三寸伸肘之時臂對眼與乳相平赤白肉際青筋上是穴也或有目睛熱障治攢竹者或有雙目冷淚治合谷青靈者又有眼久疾治清冷淵合谷者穴已載前耳症設有耳閉者可於翳風穴掐五七十度擦五七十度兼靜功翳風穴乃手少陽三焦經在於耳後尖角陷中開口便得穴兼治鼠瘡瘰癧項間痰咳咽喉疼痛並皆治之設有耳疼痛者可於頰車穴掐五七十度擦五七十度兼用靜功頰車穴乃足陽明胃經在耳墜珠下三分頰陷中間口有孔是穴也兼治諸般牙疼口眼歪斜之症設有耳聾氣閉可於聽會穴掐五七十度擦五七十度兼行靜功聽會穴乃足少陽膽經在耳珠前陷中開口得穴口中須含一物方可如法或兩耳虛鳴可於聽會合谷二穴通治咽喉口齒症設有咽喉腫痛單雙乳蛾等症可於少商穴掐五七十度擦五七十度如不愈用破磁片針此穴出血即愈矣少商穴乃手太陰肺經在大指內側去爪甲如韭菜者是也設有口臭者可於大陵穴掐五七十度擦五七十度日行數次大陵穴乃足厥陰心包絡經在手掌橫紋正中間兼治鵝掌風設有小兒乳蛾可於合谷穴掐五七十度擦五七十度日行數次合谷穴乃手陽明大腸經在大指次節歧骨肉尖上是也設有牙疼腫痛可於呂細穴掐五七十度擦五七十度兼靜功呂細穴乃足少陰腎經在腳後跟內踝骨尖後動脈陷中是穴也兼治股內濕癢生疼及便毒或牙疼掐頰車穴肩背指症設有背強痛可於至陽穴掐五七十度擦五七十度兼靜功至陽穴乃腎脈經在第七椎骨下俯首取之是其穴也設手腕無力反手背臂腫痛或因折傷不能握物或肩背疼痛不能舉動者皆於陽池穴掐五七十度擦五七十度兼靜功陽池穴乃手少陽三焦經在手背骨上陷中是穴也設有五指盡痛不能握物舒暢者可於外關穴掐五七十度擦五七十度兼靜功調攝外關穴者乃手少陽三焦經在手腕骨上二寸腕後陷中是穴也設有肩背手不能舉者可於肩髃穴掐五七十度擦五七十度肩髃穴乃手陽明大腸經在肩柱骨上肩端兩骨間陷中舉臂取之有凹處乃是穴也設有手痛屈伸難甚者可於曲池穴掐五七十度擦五七十度兼靜功曲池穴乃手陽明大腸經在肘後外橫紋尖上屈手取之此乃是穴也設有臂手牽痛者可於曲澤穴掐五七十度擦五七十度兼行靜功曲澤穴乃手厥陰心包絡經在肘內臁正中間屈肘取之兼治九種心疼不可忍者設有手掌生瘡生疥者可於勞宮穴掐五七十度擦五七十度日行數次勞宮穴乃手少陰心經在手掌中由無名指點到處是其穴也兼治心腹疼痛及胃氣疼設有肩背疼痛或陰痠疼掐投肩髃曲池手指拘攣掐合谷入風背膊高痛俱看病勢不拘定兼靜功行之心脾氣症設有心胃脾病並諸氣脹痛者可於上脘穴掐五七十度擦五七十度兼行靜功調攝上脘穴乃任脈之經在巨闕之下一寸五分臍上五寸是其穴也設有脾胃虛弱飲食不進者及心脾痛可於中脘穴掐五七十度擦五七十度兼行靜功其中脘穴乃任脈之經在臍上四寸至鳩尾骨尖之下至臍中用草心量折中是其穴也設有胃氣不和及脾寒骨熱者可於食倉穴掐五七十度擦五七十度兼行靜功調攝其食倉穴乃足少陰腎經在中脘之兩旁各開去三寸是其穴也設有胃脘痛並諸痰可於巨闕穴掐五七十度擦五七十度兼靜功巨闕穴乃在任脈經在鳩尾下一寸臍上六寸半陷中是也更有下脘乃任脈經在建里下一寸臍上二寸治同設有痞氣可於章門穴掐五七十度擦五七十度兼靜功章門穴乃足厥陰肝經在大橫紋外直季脅肋去臍上二寸兩旁橫九寸側臥屈上足手臂屈中指放耳垂下肘尖盡是也設有胃氣泄痢者可於天樞穴掐五七十度擦五七十度兼靜功天樞穴乃足陽明胃經在臍旁各開二寸是穴也或有氣痛掐擦巨闕膻中中脘氣海等穴痞塊亦治章門中脘命門者小腸氣氣海歸來大敦者蟲痛中脘食倉者皆宜參用腰腎足膝症設有腰脊痛不得俯首者可於腰俞穴掐五七十度擦五七十度兼靜功腰俞穴乃腎脈經第二十椎骨下宛宛中挺伏舒身兩手相交支額縱四體後取其穴設有脅痛者可於支溝穴掐五七十度擦五七十度兼靜功支溝穴乃手少陽三焦經在手腕骨背上三寸兩骨間陷中是穴設有腳瘴可於行間穴掐五七十度擦五七十度兼靜功行間穴乃足厥陰肝經在足虎口中大指次指歧骨間是設有腳背腫可於內庭穴掐五七十度擦五七十度兼靜功內庭穴乃足陽明胃經在足大指次指外關是設有腳腫者可於陷骨穴掐五七十度擦五七十度兼靜功陷骨穴乃足陽明胃經在足次指外去內庭一寸是穴兼治面目浮腫陰痛腸鳴腹痛及熱病汗不出者設有足麻痛者可於解溪穴掐五七十度擦五七十度兼靜功解溪穴乃足陽明胃經在足腕上繫帶處去陷谷四寸半內庭上量至足背下寸陷中是其穴也設有足脛腫及無力或兩足生瘡者可於商丘穴掐五七十度擦五七十度兼靜功商丘穴乃足太陰脾經在內踝骨下赤白肉際微前陷中此乃是穴也設有腳脛踝骨痛可於丘墟穴掐五七十度擦五七十度兼靜功丘墟穴乃足少陽膽經在足外踝微前近三分是其穴也設有跟骨痛者可於崑崙穴掐五七十度擦五七十度兼靜功崑崙穴乃足太陽膀胱經在足外踝骨後跟骨下陷中是也設有腿痛者可於絶骨穴掐五七十度擦五七十度兼靜功絶骨穴乃足少陽膽經在足上踝三寸動脈正中間是穴也設有寒濕腳氣及兩腳滲裂生瘡並血衄不止者俱於京骨穴掐五七十度兼用靜功京骨穴乃足太陽膀胱經在外足側大骨下赤白肉際陷中按而得穴設有轉筋腳氣可於承山穴掐五七十度擦五七十度兼靜功承山穴乃足太陽膀胱經在腿肚肉尖上分肉正中間陷是穴也一法在承筋穴法治承筋乃足太陽膀胱經在腿肚正中間脛後從腳跟上來七寸乃是穴也設有筋痛可於陰陵泉穴掐五七十度擦五七十度兼靜功陰陵泉穴乃足太陰脾經在膝下內側取陽陵泉為先相對是穴也陽陵泉穴乃足少陽膽經在膝外高骨下各一指取之微前陷中此外即是穴也設有膝蓋紅腫痠痛可於膝眼穴掐五七十度擦五七十度兼靜功膝眼穴乃足陽明胃經在膝蓋骨犢鼻穴外旁陷是穴也又有膝關穴乃足厥陰肝經在膝蓋骨下犢鼻穴內旁陷中是穴也設有膝痛冷痹不仁者可於梁丘穴掐五七十度擦五七十度兼用靜功梁丘穴乃足陽明胃經在膝下二寸兩筋間是穴也設有膝紅痛可於寬骨穴掐五七十度擦五七十度兼用靜功寬骨穴在膝蓋上梁丘穴兩旁各開一寸是穴也設有膝難屈伸及腰痛者可於委中穴掐五七十度擦五七十度兼用靜功委中穴乃足太陽膀胱經在膝腕正中間有紫筋者此乃即是穴也設有膝蓋痛可於陰市穴掐五七十度擦五七十度兼用靜功陰市穴乃足陽明胃經正在膝面上三寸是穴也設有腿痠疼痛可於風市穴掐五七十度擦五七十度兼用靜功風市穴乃足少陽膽經在膝上腿外側兩筋間令人直立垂手中指盡處是穴也設有風濕腿疼不能動者可於環跳穴掐五七十度擦五七十度兼行靜功環跳穴乃足少陽膽經在髀樞硯子骨間縫內側臥屈上足伸下足方得此處是穴也設有脹痛亦治脊俞脅痛亦治章門者後已載之此不宣傷寒症設有體本虛弱易感風寒者可於風門穴掐五七十度擦五七十度兼靜功調攝其風門穴乃足太陽膀胱經在背脊第二椎骨兩旁邊各開去一寸五分是穴也設有瘧疾傷寒感冒及寒熱往來結胃者可於間使穴掐五七十度擦五七十度兼靜功間使穴乃手厥陰心包絡在手掌後橫紋上去內關一寸兩筋陷中是也設有傷寒譫語結胸腹痛等證可於期門穴掐五七十度擦五七十度兼清靜功夫期門穴乃足厥陰肝經在直乳下二寸第二筋端兼治熱入血室設有久瘧可於百勞中脘間使等穴如前治穴法已不載宣痰火哮喘症設有哮吼喘急可於天突穴掐五七十度擦五七十度兼用靜功天突穴任脈經在結喉下二寸宛宛中兩筋間是穴設有胸膈悶痛痰涎擁盛可於璇璣穴掐五七十度擦五七十度兼用靜功璇璣穴乃任脈經在天突下一寸陷中是穴設有哮喘等證可於俞府華蓋乳根等穴掐五七十度擦五七十度兼用靜功俞府穴已見癆症華蓋穴乃任脈經在璇璣穴下一寸陷中仰頭取之是穴乳根穴乃足陽明胃經在乳下一寸六分陷中仰面取之是穴也設有氣急痰盛及肺癰可於肺俞穴掐五七十度擦五七十度兼用靜功肺俞穴乃足太陽膀胱經在背第三椎骨兩旁各開一寸半此乃是穴也設有吼喘可於脊中穴掐五七十度擦五七十度兼用靜功脊中穴乃督脈經在第十一椎骨下統而取之穴對前中上脘令人平站將繩自結喉上垂下至上脘又將此繩自大椎骨垂繩盡處是穴也設有咳嗽寒疾之症可於列缺掐五七十度擦五七十度兼用靜功列缺穴乃手太陰肺經在手腕後上側寸半兩手相叉食指盡處高骨縫間是穴也間有哮喘用天突靈臺少衝小指端久嗽用三里痰火用百勞三里痰火氣用巨厥中脘皆宜查明穴法參用頭痛症設有頭痛諸疾可於百會穴掐五七十度擦五七十度兼靜功百會穴乃督脈經在頭正中間先鼻中直上分路正直用草心前眉間量至後髮際除在耳尖量至右耳尖當中折斷手摩容豆許是穴也兼治脫肛設有諸頸風疼及腦泄鼻衄可於上星穴掐五七十度擦五七十度兼靜功上星穴乃督脈經在頭男左女右用草心自手掌後橫紋量至中指盡處然後移至鼻尖上牽至胸上盡處是穴設有頭痛可於囟會穴掐五七十度擦五七十度兼靜功囟會穴乃督脈在上星穴一寸陷中可容豆許是穴設有頭風筋攣衄血等症可於風府穴掐五七十度擦五七十度兼用靜功其風府穴乃督脈之經在項後兩骨正中間入髮際內一寸與風池相平是其穴也設有頭風可於風池穴掐五七十度擦五七十度兼靜功風池穴乃是足少陽膽經在耳後大筋內入髮際五分風府兩旁各開二寸是穴也或有偏正頭風用太陽風池合谷者或有腦泄用上星者皆宜查明穴法如前參用必細心按穴掐擦偏疝及婦帶下症設有小腸疝氣等症可於水道穴掐五七十度擦五七十度兼靜功其水道穴乃是陽明胃經正在天樞穴下三寸又在關元穴兩旁各開二寸是其穴也設有疝氣偏墜可於歸來穴掐五七十度擦五七十度兼靜功歸來穴乃是陽明胃經在臍心下四寸兩旁各二寸臥下舉頭有鼠形肉上此乃是其穴也設有疝氣可於大敦穴掐五七十度擦五七十度兼靜功大敦穴乃足厥陰肝經在足大指甲後爪如韭菜聚毛中是也設有男子疝氣並女子漏下可於太衝穴掐五七十度擦五七十度太衝穴乃足厥陰肝經在足大指第一縫間相去一寸半此處即是穴也設有婦人赤白帶下治氣海中脘中極宜皆查穴參用癭癧痔漏症設有痔漏腸風可於長強穴掐五七十度擦五七十度兼靜功長強穴乃督脈經在尾骶骨尖上陷中伏地得穴設有疾痔可於二白穴掐五七十度擦五七十度兼靜功二白穴在掌後橫紋四寸兩穴相對一穴在筋內一穴在筋外肩井穴乃足少陽膽經在肩上陷中缺盆骨盡處以二指按取當中指陷便是此穴也兼治婦人産暈設有鼠癧可於缺盆穴掐五七十度擦五七十度兼靜功缺盆穴乃足陽明胃經在頸下肩端橫骨上跡頸者有青脈脈牽頸陷中是穴又於肘尖上治之設有脫肛可於百會穴掐五七十度擦五七十度再用五倍明礬水洗淨以木賊草燒灰存性敷蕉葉托上愈百會穴見前或有痔漏治腰膂手臂二白三穴皆宜查明參用男女諸雜症皆治設有下元諸痰可於靈臺穴掐五七十度擦五七十度兼靜功靈臺穴乃督脈經在第六椎骨節下俯首取之設有婦人帶下月經不調男子腰痛腎寒遺精俱於腎俞穴掐五七十度擦五七十度兼靜功腎俞穴乃足太陽膀胱經在第十四椎骨下兩旁各開一寸半此乃是穴也設有內熱火盛腹痛可於內關穴五七十度擦五七十度兼靜功內關穴乃手厥陰心包絡在手掌後橫紋去大陵穴二寸兩筋間正坐仰手取之是其穴也設有男子諸風痛女子血氣痛可於申脈穴掐五七十度擦五七十度兼用靜功申脈穴乃足太陽膀胱經在足外踝下五分赤白肉際是穴也設有淋漓白濁及婦人經水不調並陰蹺癇病夜發者可於照海穴掐五七十度擦五七十度兼功照海穴乃足少陰腎經在足內踝赤白肉際令對坐而取之設有婦人月水不調可於三陰交穴掐五七十度擦五七十度兼靜功三陰交穴乃足太陰脾經在足內踝上三寸骨筋陷中是穴也設有中風溺水陽絶腸痛等症可於神闕穴掐五七十度擦五七十度兼靜功調攝仍以燒鹽填滿上用火尉如小便不通用蔥槌碎填尉處神闕穴乃任脈經在臍中是也設有婦人無子及月經不調可於陰交穴治陰交穴乃任脈經在臍下一寸婦人血氣塊痛調經種子可於氣穴治氣穴乃足少陰腎經在陰戶兩旁各開一寸半左名包門右名子戶諸瘡百蟲窠三里解溪俱如前掐擦兼用靜功頭疼症凡頭昏痛當端坐閉氣咬牙雙手掩耳擊天鼓三通每通十二叩齒三通每通十二即行三通次用兩手雙摩太陽七十度每手摩崑崙一百二十度如前再行三次復叩齒而止凡行此功當於無風密室而行凡混腦頭風背坐以雙手抱兩耳指尖在腦後相接閉氣十二口叩齒三通拍項九下日行三五次凡頭風流冷淚閉氣用兩手抱額腦將頭向前後搖五七十次待眼熱淚止為度如氣急重閉再行可也凡頭腦痛盤膝端坐用兩手大二指掐住兩耳門閉住眼耳口鼻送丹田七孔之氣上升頂門日行數次愈為度眼目症凡三焦血熱眼昏正坐擦熱手摩臍輪後按摩兩膝蓋待暖再摩臍輪再按摩膝蓋俟氣定再行日行三五次為度凡眼腫痛端坐叩